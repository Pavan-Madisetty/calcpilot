name: Build and Deploy CalcPilot to Azure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ==========================================
  # 1. BUILD & DEPLOY RESPONSIVE WEB FRONTEND
  # ==========================================
  deploy-frontend:
    name: Build & Deploy Next.js Web App
    runs-on: ubuntu-latest
    steps:
      - name: Check out Repository code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./web

      - name: Compile Next.js Web App
        run: npm run build
        working-directory: ./web

      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'calcpilot-web' # Replace with your Azure Web App name
          publish-profile: ${{ secrets.AZURE_WEBAPP_FRONTEND_PUBLISH_PROFILE }}
          package: './web'

  # ==========================================
  # 2. BUILD & DEPLOY NESTJS REST BACKEND API
  # ==========================================
  deploy-backend:
    name: Build & Deploy NestJS Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Check out Repository code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Backend Dependencies
        run: npm ci --prefix ./backend

      - name: Compile NestJS Server
        run: npm run build --prefix ./backend

      - name: Deploy Backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'calcpilot-api' # Replace with your Azure App Service API name
          publish-profile: ${{ secrets.AZURE_WEBAPP_BACKEND_PUBLISH_PROFILE }}
          package: './backend'
